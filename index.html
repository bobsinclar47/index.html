<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriverZone Pro</title>
</head>
<body style="background:#0F0F0F;color:white;font-family:Arial,sans-serif;margin:0;padding:20px">

<!-- LOGIN -->
<div id="login" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
<div style="font-size:80px;margin-bottom:20px">🚕💹</div>
<h1 style="color:#00B14F;font-size:28px;margin:10px 0">DriverZone Pro</h1>
<p style="color:#888;margin-bottom:30px">Find Hot Spots, Earn More</p>
<input type="tel" id="phone" placeholder="812 3456 7890" style="width:100%;max-width:300px;padding:15px;border-radius:10px;border:2px solid #333;background:#1A1A1A;color:white;font-size:16px;margin-bottom:15px">
<button onclick="doContinue()" style="width:100%;max-width:300px;padding:15px;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;border:none;margin:5px 0;background:#00B14F;color:white">🚀 Continue</button>
<button onclick="doSkip()" style="width:100%;max-width:300px;padding:15px;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;border:2px solid #333;margin:5px 0;background:#252525;color:white">Skip Login</button>
</div>

<!-- VEHICLE -->
<div id="vehicleScreen" style="min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center">
<div style="font-size:80px;margin-bottom:20px">🚗</div>
<h1 style="color:#00B14F;font-size:28px;margin:10px 0">Select Vehicle</h1>
<p style="color:#888;margin-bottom:30px">Choose your vehicle type</p>
<button onclick="selectVehicle('moto')" style="width:100%;max-width:300px;padding:15px;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;border:none;margin:5px 0;background:#00B14F;color:white">🏍️ Motorcycle</button>
<button onclick="selectVehicle('car')" style="width:100%;max-width:300px;padding:15px;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;border:none;margin:5px 0;background:#4ECDC4;color:white">🚗 Car</button>
<button id="btnConfirm" onclick="confirmVehicle()" disabled style="width:100%;max-width:300px;padding:15px;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;border:none;margin:15px 0;background:#555;color:#888">Continue</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;padding:20px;padding-bottom:100px">
<div style="background:#1A1A1A;padding:20px;border-radius:10px;margin-bottom:20px">
<h2 style="color:#00B14F;margin:0 0 15px 0">📍 Nearby Spots</h2>
<p style="color:#888;margin:0">GPS: <span id="gps">Click button below</span></p>
<button onclick="gps()" style="width:100%;max-width:300px;padding:15px;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;border:none;margin:15px 0 0 0;background:#00B14F;color:white">📍 Enable GPS</button>
</div>
</div>

<script>
var vehicleType='moto';
var selectedVehicle=null;

function doContinue(){
    alert('Continue clicked!');
    var p=document.getElementById('phone').value;
    if(p.length<8){alert('Phone too short (min 8 digits)');return;}
    localStorage.setItem('dz_phone',p);
    document.getElementById('login').style.display='none';
    document.getElementById('vehicleScreen').style.display='flex';
    alert('Login saved! Select vehicle.');
}

function doSkip(){
    alert('Skip clicked!');
    document.getElementById('login').style.display='none';
    document.getElementById('vehicleScreen').style.display='flex';
}

function selectVehicle(type){
    selectedVehicle=type;
    var btn=document.getElementById('btnConfirm');
    btn.disabled=false;
    btn.style.background='#00B14F';
    btn.style.color='white';
    alert('Vehicle selected: '+type);
}

function confirmVehicle(){
    alert('Confirm vehicle: '+selectedVehicle);
    if(!selectedVehicle){alert('Please select a vehicle');return;}
    vehicleType=selectedVehicle;
    localStorage.setItem('dz_vehicle',vehicleType);
    document.getElementById('vehicleScreen').style.display='none';
    document.getElementById('main').style.display='block';
    alert('Vehicle saved! Loading GPS...');
    gps();
}

function gps(){
    document.getElementById('gps').textContent='Searching...';
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(
            function(p){
                document.getElementById('gps').textContent='Active ✓ Lat:'+p.coords.latitude.toFixed(2);
                alert('GPS Active!\nLat: '+p.coords.latitude.toFixed(2)+'\nLng: '+p.coords.longitude.toFixed(2));
            },
            function(err){
                document.getElementById('gps').textContent='Denied ✗';
                alert('GPS Error: '+err.message);
            }
        );
    }else{
        document.getElementById('gps').textContent='Not supported';
        alert('GPS not supported on this device');
    }
}

// Check on load
window.onload=function(){
    alert('Page loaded!');
    var saved=localStorage.getItem('dz_phone');
    var savedVehicle=localStorage.getItem('dz_vehicle');
    if(saved && savedVehicle){
        vehicleType=savedVehicle;
        document.getElementById('login').style.display='none';
        document.getElementById('main').style.display='block';
        alert('Welcome back! Vehicle: '+vehicleType);
        gps();
    }else if(saved){
        document.getElementById('login').style.display='none';
        document.getElementById('vehicleScreen').style.display='flex';
        alert('Phone saved. Select vehicle.');
    }
};
</script>
</body>
</html>
